<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard SAT</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================================= -->
    <!-- NAVBAR                                   -->
    <!-- ========================================= -->

    <nav>

        <div class="logo">
            SAT Dashboard
        </div>

        <ul>

            <li><a href="#">Início</a></li>
            <li><a href="#">Financeiro</a></li>
            <li><a href="#">Agenda</a></li>
            <li><a href="#">Relatórios</a></li>

        </ul>

    </nav>

    <!-- ========================================= -->
    <!-- DASHBOARD                                -->
    <!-- ========================================= -->

    <main class="dashboard">

        <!-- ========================================= -->
        <!-- BLOCO SUPERIOR                           -->
        <!-- ========================================= -->

        <section class="topo">

            <!-- 3 COLUNAS FINANCEIRAS -->

            <div class="financeiro">

                <!-- ESSENCIAIS -->

                <section class="painel essenciais">

                    <div class="cabecalho vermelho">

                        <h2>Essenciais</h2>

                        <span id="totalEssenciais">
                            R$ 0,00
                        </span>

                    </div>

                    <table>

                        <tbody id="tbEssenciais">

                        </tbody>

                    </table>

                    <div class="rodape">

                        <span id="saldoEssenciais">

                            R$ 0,00

                        </span>

                    </div>

                </section>



                <!-- OCASIONAIS -->

                <section class="painel ocasionais">

                    <div class="cabecalho laranja">

                        <h2>Ocasionais</h2>

                        <span id="totalOcasionais">

                            R$ 0,00

                        </span>

                    </div>

                    <table>

                        <tbody id="tbOcasionais">

                        </tbody>

                    </table>

                    <div class="rodape">

                        <span id="saldoOcasionais">

                            R$ 0,00

                        </span>

                    </div>

                </section>



                <!-- INVESTIMENTOS -->

                <section class="painel investimentos">

                    <div class="cabecalho azul">

                        <h2>Investimentos</h2>

                        <span id="totalInvestimentos">

                            R$ 0,00

                        </span>

                    </div>

                    <table>

                        <tbody id="tbInvestimentos">

                        </tbody>

                    </table>

                    <div class="rodape">

                        <span id="saldoInvestimentos">

                            R$ 0,00

                        </span>

                    </div>

                </section>

            </div>

            <!-- ========================================= -->
            <!-- GRÁFICO                                  -->
            <!-- ========================================= -->

            <section class="card grafico">

                <h2>

                    Distribuição

                </h2>

                <canvas id="pizza"></canvas>

            </section>

        </section>



        <!-- ========================================= -->
        <!-- SEGUNDA LINHA                             -->
        <!-- ========================================= -->

        <section class="linha">

            <section class="card saldo">

                <h2>

                    Saldo

                </h2>

                <div id="saldoAtual">

                    R$ 0,00

                </div>

            </section>

            <section class="card cartoes">

                <h2>

                    Cartões

                </h2>

                <table>

                    <tbody id="tbCartoes">

                    </tbody>

                </table>

            </section>

            <section class="card pagamentos">

                <h2>

                    Pagamentos

                </h2>

                <table>

                    <tbody id="tbPagamentos">

                    </tbody>

                </table>

            </section>

        </section>



        <!-- ========================================= -->
        <!-- TERCEIRA LINHA                            -->
        <!-- ========================================= -->

        <section class="linha">

            <section class="card agenda">

                <h2>

                    Agenda

                </h2>

                <iframe

                    src="https://calendar.google.com/calendar/embed?height=700&wkst=1&ctz=America%2FSao_Paulo"

                    loading="lazy">

                </iframe>

            </section>



            <section class="card meta">

                <h2>

                    Meta da Moto

                </h2>

                <canvas id="moto"></canvas>

            </section>

        </section>

    </main>



    <footer>

        Dashboard SAT © 2026

    </footer>

    <script src="script.js"></script>

</body>

</html>
