<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard SAT</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!--========================-->
    <!-- NAVBAR                 -->
    <!--========================-->

    <nav>

        <div class="logo">

            SAT Dashboard

        </div>

        <ul>

            <li><a href="#">Início</a></li>

            <li><a href="#">Financeiro</a></li>

            <li><a href="#">Agenda</a></li>

            <li><a href="#">Relatórios</a></li>

            <li><a href="#">Configurações</a></li>

        </ul>

    </nav>

    <!--========================-->
    <!-- DASHBOARD              -->
    <!--========================-->

    <main class="dashboard">

        <!-- PRIMEIRA LINHA -->

        <section class="linhaSuperior">

            <!-- COLUNAS FINANCEIRAS -->

            <section class="financeiro">

                <!-- ESSENCIAIS -->

                <article class="painel essenciais">

                    <header>

                        <h2>Essenciais</h2>

                        <span id="totalEssenciais">

                            R$ 0,00

                        </span>

                    </header>

                    <table>

                        <tbody id="tbEssenciais">

                        </tbody>

                    </table>

                    <footer>

                        <span id="saldoEssenciais">

                            R$ 0,00

                        </span>

                    </footer>

                </article>

                <!-- OCASIONAIS -->

                <article class="painel ocasionais">

                    <header>

                        <h2>Ocasionais</h2>

                        <span id="totalOcasionais">

                            R$ 0,00

                        </span>

                    </header>

                    <table>

                        <tbody id="tbOcasionais">

                        </tbody>

                    </table>

                    <footer>

                        <span id="saldoOcasionais">

                            R$ 0,00

                        </span>

                    </footer>

                </article>

                <!-- INVESTIMENTOS -->

                <article class="painel investimentos">

                    <header>

                        <h2>Investimentos</h2>

                        <span id="totalInvestimentos">

                            R$ 0,00

                        </span>

                    </header>

                    <table>

                        <tbody id="tbInvestimentos">

                        </tbody>

                    </table>

                    <footer>

                        <span id="saldoInvestimentos">

                            R$ 0,00

                        </span>

                    </footer>

                </article>

            </section>

            <!-- GRÁFICO -->

            <aside class="grafico card">

                <h2>

                    Distribuição

                </h2>

                <canvas id="graficoPizza"></canvas>

            </aside>

        </section>

        <!-- SEGUNDA LINHA -->

        <section class="linhaMeio">

            <article class="saldo card">

                <h2>

                    Saldo Atual

                </h2>

                <h1 id="saldo">

                    R$ 0,00

                </h1>

            </article>

            <article class="cartoes card">

                <h2>

                    Cartões

                </h2>

                <table>

                    <tbody id="tbCartoes">

                    </tbody>

                </table>

            </article>

            <article class="pagamentos card">

                <h2>

                    Pagamentos

                </h2>

                <table>

                    <tbody id="tbPagamentos">

                    </tbody>

                </table>

            </article>

        </section>

        <!-- TERCEIRA LINHA -->

        <section class="linhaInferior">

            <article class="agenda card">

                <h2>

                    Agenda

                </h2>

                <iframe
                    src="https://calendar.google.com/calendar/embed?height=700&wkst=1&ctz=America%2FSao_Paulo">

                </iframe>

            </article>

            <article class="moto card">

                <h2>

                    Meta da Moto

                </h2>

                <canvas id="graficoMoto">

                </canvas>

            </article>

        </section>

    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
